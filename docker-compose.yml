services:
  db:
    image: postgres:16-alpine
    container_name: youengage-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: youengage
      POSTGRES_PASSWORD: ${DB_PASSWORD:-youengage_password}
      POSTGRES_DB: youengage
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U youengage"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: youengage-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: "postgresql://youengage:${DB_PASSWORD:-youengage_password}@db:5432/youengage?schema=public"
      AUTH_SECRET: "${AUTH_SECRET}"
      AUTH_URL: "${AUTH_URL:-http://localhost:3000}"
      AUTH_TRUST_HOST: "true"
      AUTH_MICROSOFT_ENTRA_ID_ID: "${AUTH_MICROSOFT_ENTRA_ID_ID}"
      AUTH_MICROSOFT_ENTRA_ID_SECRET: "${AUTH_MICROSOFT_ENTRA_ID_SECRET}"
      AUTH_MICROSOFT_ENTRA_ID_TENANT_ID: "${AUTH_MICROSOFT_ENTRA_ID_TENANT_ID}"
      UPLOAD_DIR: "/app/uploads"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
    name: youengage-pgdata
  uploads:
    name: youengage-uploads
